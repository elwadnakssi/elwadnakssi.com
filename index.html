<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL WADNAKSSI EVENTS & TECH | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dark: #8a6f2e;
            --deep: #0a0612;
            --deep2: #110820;
            --purple: #1e0a3c;
            --text: #f0e8d8;
            --text-muted: rgba(240,232,216,0.55);
        }

        html, body {
            height: 100%;
            background: var(--deep);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        /* ── CANVAS BG ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── NOISE OVERLAY ── */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .card {
            width: min(660px, 100%);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px;
            padding: 60px 56px;
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 80px rgba(201,168,76,0.06),
                0 40px 80px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.07);
            animation: cardIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* ── ORNAMENT ── */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.8s 0.3s ease both;
        }
        .ornament-line {
            height: 1px;
            width: 56px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
        .ornament-diamond {
            width: 8px; height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        /* ── BRAND ── */
        .brand {
            opacity: 0;
            animation: fadeUp 0.9s 0.45s ease both;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            line-height: 1;
            background: linear-gradient(135deg, #e8d5a3 0%, #c9a84c 40%, #f0e0a0 70%, #c9a84c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .brand-sub {
            font-size: 0.8rem;
            letter-spacing: 0.35em;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 300;
        }

        /* ── STATUS BADGE ── */
        .badge-wrap {
            margin: 32px auto;
            opacity: 0;
            animation: fadeUp 0.9s 0.6s ease both;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 22px;
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 100px;
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold-light);
            font-weight: 500;
        }
        .badge-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--gold);
            animation: pulse 2s infinite;
        }

        /* ── TAGLINE ── */
        .tagline {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: fadeUp 0.9s 0.75s ease both;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0;
            opacity: 0;
            animation: fadeUp 0.9s 0.9s ease both;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(201,168,76,0.15);
        }
        .divider-icon {
            width: 32px; height: 32px;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 50%;
            display: grid;
            place-items: center;
        }
        .divider-icon svg { width: 14px; height: 14px; stroke: var(--gold); fill: none; }

        /* ── CONTACT ── */
        .contacts {
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            animation: fadeUp 0.9s 1.05s ease both;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: color 0.25s;
        }
        .contact-item:hover { color: var(--text); }
        .contact-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.15);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: background 0.25s, border-color 0.25s;
        }
        .contact-item:hover .contact-icon {
            background: rgba(201,168,76,0.15);
            border-color: rgba(201,168,76,0.35);
        }
        .contact-icon svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; }
        a { color: inherit; text-decoration: none; }
        a:hover { color: var(--gold-light); }

        /* ── WHATSAPP BTN ── */
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            padding: 13px 28px;
            background: #25D366;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff !important;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            box-shadow: 0 4px 24px rgba(37,211,102,0.25);
            opacity: 0;
            animation: fadeUp 0.9s 1.2s ease both;
        }
        .whatsapp-btn:hover {
            background: #1ebe5d;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(37,211,102,0.35);
        }
        .whatsapp-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

        /* ── FOOTER ── */
        .footer {
            margin-top: 44px;
            font-size: 0.72rem;
            color: rgba(240,232,216,0.25);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.9s 1.35s ease both;
        }

        /* ── KEYFRAMES ── */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        @media (max-width: 520px) {
            .card { padding: 44px 28px; }
        }
    </style>
</head>
<body>

<script>
    // Animated particle canvas background
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const GOLD = [201, 168, 76];
    const PURPLE = [80, 30, 140];

    class Particle {
        constructor() { this.reset(true); }
        reset(init) {
            this.x = Math.random() * canvas.width;
            this.y = init ? Math.random() * canvas.height : canvas.height + 20;
            this.r = Math.random() * 1.8 + 0.4;
            this.speed = Math.random() * 0.4 + 0.1;
            this.drift = (Math.random() - 0.5) * 0.25;
            this.alpha = Math.random() * 0.35 + 0.05;
            this.color = Math.random() > 0.5 ? GOLD : PURPLE;
        }
        update() {
            this.y -= this.speed;
            this.x += this.drift;
            if (this.y < -10) this.reset(false);
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color.join(',')},${this.alpha})`;
            ctx.fill();
        }
    }

    const particles = Array.from({ length: 90 }, () => new Particle());

    // Radial gradient bg
    function drawBg() {
        const grd = ctx.createRadialGradient(
            canvas.width * 0.5, canvas.height * 0.4, 0,
            canvas.width * 0.5, canvas.height * 0.4, canvas.width * 0.75
        );
        grd.addColorStop(0, '#1a0438');
        grd.addColorStop(0.5, '#0e0220');
        grd.addColorStop(1, '#050010');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Subtle glow orbs
    function drawOrbs() {
        [{x:.3,y:.2,c:[100,40,180]},{x:.7,y:.65,c:[180,120,30]},{x:.15,y:.75,c:[60,20,120]}].forEach(o => {
            const g = ctx.createRadialGradient(
                canvas.width*o.x, canvas.height*o.y, 0,
                canvas.width*o.x, canvas.height*o.y, canvas.width*0.35
            );
            g.addColorStop(0, `rgba(${o.c.join(',')},0.12)`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
    }

    function loop() {
        drawBg();
        drawOrbs();
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    loop();
</script>
